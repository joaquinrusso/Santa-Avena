<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santa Avena Snacks</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { background: #f8f9fa; padding: 10px; text-align: center; }
        .cart { padding: 20px; }
        .product { border: 1px solid #ccc; margin: 10px; padding: 10px; text-align: center; }
        footer { text-align: center; padding: 20px; margin-top: 20px; background: #f8f9fa; }
    </style>
</head>
<body>
    <header>
        <h1>Bienvenidos a Santa Avena</h1>
        <p>Deliciosos snacks saludables</p>
    </header>
    <div class="cart">
        <h2>Catálogo de Productos</h2>
        <div class="product">
            <img src="volante.jpeg" alt="Producto 1" style="width:100%; max-width:300px;"><!-- Change this path as necessary -->
            <h3>Producto 1</h3>
            <p>Descripción del producto</p>
        </div>
        <div class="product">
            <img src="volante.jpeg" alt="Producto 2" style="width:100%; max-width:300px;"><!-- Change this path as necessary -->
            <h3>Producto 2</h3>
            <p>Descripción del producto</p>
        </div>
        <!-- Add more products as needed -->
    </div>
    <div class="order-form">
        <h2>Formulario de Pedido</h2>
        <form>
            <label for="name">Nombre:</label><br>
            <input type="text" id="name" name="name" required><br>
            <label for="surname">Apellido:</label><br>
            <input type="text" id="surname" name="surname" required><br>
            <label>Forma de Pago:</label><br>
            <select name="payment-method" required>
                <option value="efectivo">Efectivo</option>
                <option value="transferencia">Transferencia</option>
            </select><br>
            <label>Forma de Entrega:</label><br>
            <select name="delivery-method" required>
                <option value="domicilio">Domicilio</option>
                <option value="retiro">Retiro Personal</option>
            </select><br>
            <label>Costos de Envío: 2500 pesos</label><br>
            <input type="submit" value="Enviar Pedido">
        </form>
    </div>
    <footer>
        <h3>Contacto</h3>
        <p>Teléfono: 1156413883</p>
    </footer>
</body>
</html>
