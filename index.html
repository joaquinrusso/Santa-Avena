<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santa Avena</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Bienvenidos a Santa Avena</h1>
    </header>
    <main>
        <section>
            <h2>Nuestros Productos</h2>
            <article>
                <h3>Barrita de Cereal</h3>
                <img src="barrita.jpeg" alt="Barrita de Cereal">
                <p>Precio: $2000</p>
                <p>Nutrientes: 6g de proteína, 4.5g de fibra, 230 kcal</p>
                <button class="add-to-cart">Agregar al Carrito</button>
            </article>
            <article>
                <h3>Budín</h3>
                <img src="budin.jpeg" alt="Budín">
                <p>Precio: $1500</p>
                <button class="add-to-cart">Agregar al Carrito</button>
            </article>
        </section>
        <section id="reviews">
            <h2>Comentarios</h2>
            <textarea id="comment-box" placeholder="Deja tu comentario aquí..."></textarea>
            <button id="submit-comment">Enviar</button>
        </section>
    </main>
    <footer>
        <p>Contacto: <a href="https://wa.me/5491156413883">WhatsApp</a></p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
